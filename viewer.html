<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mygration Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0b1120;font-family:'Inter',-apple-system,sans-serif;color:#f1f5f9}
        #map{width:100%;height:100%}
        .overlay{position:absolute;z-index:1000;pointer-events:none;color:#f1f5f9}

        /* Top bar */
        .top-bar{top:0;left:0;right:0;padding:1rem 1.5rem;background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,transparent 100%);display:flex;justify-content:space-between;align-items:center}
        .brand{display:flex;align-items:center;gap:0.5rem;font-size:1.375rem;font-weight:800;text-decoration:none;color:#f1f5f9;background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);border-radius:999px;padding:0.5rem 1.25rem 0.5rem 0.625rem;border:1px solid rgba(255,255,255,0.1);pointer-events:auto}
        .brand svg{width:30px;height:30px}
        .settings-btn{pointer-events:auto;background:rgba(15,23,42,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:0.5rem 1.25rem;color:#f1f5f9;font-size:0.9375rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem}
        .settings-btn:hover{background:rgba(255,255,255,0.12)}

        /* Title + view badge (centered, stacked) */
        .center-stack{top:1rem;left:50%;transform:translateX(-50%);text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.5rem}
        .title-pill{background:linear-gradient(135deg,rgba(59,130,246,0.25),rgba(16,185,129,0.2));backdrop-filter:blur(12px);border:1px solid rgba(59,130,246,0.3);border-radius:999px;padding:0.625rem 2rem;font-size:1.25rem;font-weight:800;letter-spacing:-0.01em}
        .view-badge{background:rgba(15,23,42,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:0.4rem 1.25rem;font-size:0.9375rem;font-weight:600;color:#cbd5e1}

        /* Legend */
        .legend{bottom:3.5rem;right:1.25rem;background:rgba(11,17,32,0.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1rem 1.25rem;min-width:200px}
        .legend h4{font-size:0.9375rem;font-weight:700;margin-bottom:0.5rem}
        .legend-item{display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;padding:0.25rem 0}
        .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
        .legend-count{margin-left:auto;color:#64748b;font-size:0.8125rem;font-variant-numeric:tabular-nums}

        /* Attribution */
        .attribution{bottom:0;left:0;right:0;padding:0.75rem 1.5rem;background:linear-gradient(0deg,rgba(0,0,0,0.5) 0%,transparent 100%);font-size:0.8125rem;color:#94a3b8;display:flex;justify-content:space-between;align-items:center}
        .attribution a{color:#94a3b8;text-decoration:none}
        .attribution a:hover{color:#f1f5f9}
        .data-time{font-size:0.75rem;color:#64748b}

        /* Progress bar */
        .progress-bar{bottom:0;left:0;height:3px;background:#3b82f6;z-index:1001;transition:width linear}

        /* Loading */
        .loading-screen{position:fixed;inset:0;z-index:9999;background:#0b1120;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
        .loading-screen.hidden{display:none}
        .loading-spinner{width:44px;height:44px;border:3px solid #2d3a4d;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{color:#94a3b8;font-size:1.0625rem}

        /* Rare alert */
        .rare-alert{top:6rem;right:1.25rem;background:rgba(239,68,68,0.15);backdrop-filter:blur(8px);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:1rem 1.25rem;max-width:300px;transform:translateX(120%);transition:transform 0.4s ease}
        .rare-alert.show{transform:translateX(0);pointer-events:auto}
        .rare-alert-badge{font-size:0.75rem;font-weight:700;text-transform:uppercase;color:#ef4444}
        .rare-alert-name{font-size:1.0625rem;font-weight:600;margin-top:0.25rem}
        .rare-alert-location{font-size:0.875rem;color:#94a3b8}

        .leaflet-control-attribution{display:none!important}

        @media(max-width:640px){
            .top-bar{padding:0.75rem 1rem}
            .brand{font-size:1.125rem;padding:0.4rem 1rem 0.4rem 0.5rem}
            .center-stack{top:4rem}
            .title-pill{font-size:1rem;padding:0.5rem 1.5rem}
            .view-badge{font-size:0.8125rem}
            .legend{bottom:3rem;right:0.75rem;padding:0.75rem 1rem;min-width:160px}
            .legend-item{font-size:0.8125rem}
        }
    </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div><div class="loading-text">Loading migration data...</div></div>
<div id="map"></div>

<!-- Top bar: brand left, settings right -->
<div class="overlay top-bar">
    <a href="/app.html" class="brand">
        <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.5"/><path d="M6 16c2-3.5 5.5-7 11-9" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/><circle cx="17" cy="9" r="2" fill="#10b981" opacity="0.9"/><circle cx="12" cy="13" r="1.5" fill="#ec4899" opacity="0.8"/><circle cx="20" cy="14" r="1.5" fill="#f59e0b" opacity="0.8"/></svg>
        Mygration
    </a>
    <a href="/app.html" class="settings-btn">Settings</a>
</div>

<!-- Centered: species title + view badge -->
<div class="overlay center-stack">
    <div class="title-pill" id="viewTitle">Bird Migration</div>
    <div class="view-badge" id="viewBadge">North America</div>
</div>

<!-- Legend -->
<div class="overlay legend" id="legend"><h4 id="legendGroupName">Species</h4><div id="legendItems"></div></div>

<!-- Attribution with eBird + data timestamp -->
<div class="overlay attribution">
    <span>Data: <a href="https://ebird.org" target="_blank" rel="noopener">eBird.org</a> / Cornell Lab of Ornithology</span>
    <span class="data-time" id="dataTime"></span>
    <span>Mygration</span>
</div>

<div class="overlay progress-bar" id="progressBar" style="width:0;"></div>
<div class="overlay rare-alert" id="rareAlert"><div class="rare-alert-badge">Rare Sighting</div><div class="rare-alert-name" id="rareAlertName"></div><div class="rare-alert-location" id="rareAlertLocation"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/viewer.js?v=4"></script>
</body>
</html>
