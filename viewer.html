<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mygration Viewer</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png?v=3">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0b1120;font-family:'Inter',-apple-system,sans-serif;color:#f1f5f9}
        #map{width:100%;height:100%}
        .overlay{position:absolute;z-index:1000;pointer-events:none;color:#f1f5f9}

        /* Top bar */
        .top-bar{top:0;left:0;right:0;padding:1rem 1.5rem;background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,transparent 100%);display:flex;justify-content:space-between;align-items:center}
        .brand{display:flex;align-items:center;gap:0.5rem;font-size:1.375rem;font-weight:800;text-decoration:none;color:#f1f5f9;background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);border-radius:999px;padding:0.5rem 1.25rem 0.5rem 0.625rem;border:1px solid rgba(255,255,255,0.1);pointer-events:auto}
        .brand img{width:30px;height:30px;border-radius:50%}
        .settings-btn{pointer-events:auto;background:rgba(15,23,42,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:0.5rem 1.25rem;color:#f1f5f9;font-size:0.9375rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem}
        .settings-btn:hover{background:rgba(255,255,255,0.12)}

        /* Title + view badge (centered, stacked) */
        .center-stack{top:1rem;left:50%;transform:translateX(-50%);text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.5rem}
        .title-pill{background:linear-gradient(135deg,rgba(59,130,246,0.25),rgba(16,185,129,0.2));backdrop-filter:blur(12px);border:1px solid rgba(59,130,246,0.3);border-radius:999px;padding:0.625rem 2rem;font-size:1.25rem;font-weight:800;letter-spacing:-0.01em}
        .view-badge{background:rgba(15,23,42,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:0.4rem 1.25rem;font-size:0.9375rem;font-weight:600;color:#cbd5e1}

        /* Big sighting counter (bottom-left, above legend) */
        .sighting-counter{
            position:absolute;bottom:3.5rem;left:1.25rem;z-index:1000;pointer-events:none;
        }
        .counter-num{font-size:3.5rem;font-weight:800;line-height:1;letter-spacing:-0.02em;
            background:linear-gradient(135deg,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .counter-label{font-size:0.9375rem;color:#94a3b8;font-weight:500;margin-top:0.25rem}

        /* Legend */
        .legend{bottom:6.5rem;right:1.25rem;background:rgba(11,17,32,0.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1rem 1.25rem;min-width:200px}
        .legend h4{font-size:0.9375rem;font-weight:700;margin-bottom:0.125rem}
        .legend-period{font-size:0.6875rem;color:#64748b;margin-bottom:0.5rem}
        .legend-item{display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;padding:0.25rem 0}
        .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
        .legend-count{margin-left:auto;color:#64748b;font-size:0.8125rem;font-variant-numeric:tabular-nums}

        /* Attribution */
        .attribution{bottom:0;left:0;right:0;padding:0.75rem 1.5rem;background:linear-gradient(0deg,rgba(0,0,0,0.5) 0%,transparent 100%);font-size:0.8125rem;color:#94a3b8;display:flex;justify-content:space-between;align-items:center}
        .attribution a{color:#94a3b8;text-decoration:none}
        .attribution a:hover{color:#f1f5f9}
        .data-time{font-size:0.75rem;color:#64748b}

        /* Progress bar */
        .progress-bar{bottom:0;left:0;height:3px;background:#3b82f6;z-index:1001;transition:width linear}

        /* Loading */
        .loading-screen{position:fixed;inset:0;z-index:9999;background:#0b1120;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
        .loading-screen.hidden{display:none}
        .loading-spinner{width:44px;height:44px;border:3px solid #2d3a4d;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{color:#94a3b8;font-size:1.0625rem}

        /* Rare sighting full-screen card (bottom bar) */
        .rare-card{
            position:absolute;bottom:2rem;left:2rem;right:2rem;
            display:none;align-items:stretch;gap:0;
            background:rgba(15,23,42,0.92);backdrop-filter:blur(16px);
            border:1px solid rgba(255,255,255,0.08);border-radius:16px;
            box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;z-index:1100;
            max-height:35vh;
        }
        .rare-card.show{display:flex}
        .rare-card-img{width:30%;min-width:140px;max-height:100%;object-fit:cover;object-position:center;background:#1e293b}
        .rare-card-noimg{width:30%;min-width:140px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e293b,#334155);font-size:3rem;color:#475569}
        .rare-card-info{flex:1;padding:1.5rem 2rem;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
        .rare-card-badge{display:inline-block;font-size:0.75rem;font-weight:700;background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);padding:0.2rem 0.6rem;border-radius:6px;align-self:flex-start;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.5rem}
        .rare-card-name{font-size:1.75rem;font-weight:800;color:#f1f5f9;line-height:1.2}
        .rare-card-sci{font-size:1rem;color:#94a3b8;font-style:italic;margin-top:0.25rem}
        .rare-card-loc{font-size:1rem;color:#cbd5e1;margin-top:0.75rem;display:flex;align-items:center;gap:0.4rem}
        .rare-card-loc .pin{color:#ef4444}
        .rare-card-meta{display:flex;gap:1.5rem;margin-top:0.5rem;font-size:0.875rem;color:#64748b}
        @media(max-width:640px){
            .rare-card{bottom:1rem;left:1rem;right:1rem;max-height:40vh}
            .rare-card-img,.rare-card-noimg{width:25%;min-width:100px}
            .rare-card-info{padding:1rem}
            .rare-card-name{font-size:1.25rem}
            .rare-card-sci{font-size:0.875rem}
        }

        /* Nav arrows */
        .nav-arrows{position:absolute;top:50%;z-index:1100;transform:translateY(-50%);pointer-events:auto}
        .nav-arrow{
            width:48px;height:48px;border-radius:50%;
            background:rgba(15,23,42,0.7);backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,0.1);
            color:#f1f5f9;font-size:1.25rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:all 0.2s;opacity:0.5;
        }
        .nav-arrow:hover{opacity:1;background:rgba(15,23,42,0.9);transform:scale(1.1)}
        .nav-left{left:1rem}
        .nav-right{right:1rem}

        /* View dots (pagination indicator) */
        .view-dots{
            position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);
            z-index:1100;display:flex;gap:0.5rem;align-items:center;
            background:rgba(15,23,42,0.7);backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,0.08);border-radius:999px;
            padding:0.4rem 0.75rem;pointer-events:auto;
        }
        .view-dot{
            width:8px;height:8px;border-radius:50%;
            background:rgba(255,255,255,0.2);cursor:pointer;
            transition:all 0.2s;
        }
        .view-dot.active{background:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,0.5)}
        .view-dot.rare{background:rgba(239,68,68,0.3)}
        .view-dot.rare.active{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5)}
        .view-dot:hover{transform:scale(1.3)}

        /* Sponsored by badge (lower-right) */
        .sponsored-badge{
            position:absolute;bottom:3rem;right:1.25rem;z-index:1100;pointer-events:auto;
            background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);
            border-radius:12px;padding:0.5rem 0.875rem;
            display:flex;align-items:center;gap:0.5rem;
            text-decoration:none;color:#333;
            box-shadow:0 2px 12px rgba(0,0,0,0.25);
            transition:transform 0.2s,box-shadow 0.2s;
        }
        .sponsored-badge:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(0,0,0,0.35)}
        .sponsored-label{font-size:0.625rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.04em;line-height:1}
        .sponsored-logo{height:22px;width:auto}
        .sponsored-text{display:flex;flex-direction:column;gap:0.125rem}
        .sponsored-name{font-size:0.75rem;font-weight:700;color:#2d5016;line-height:1.1}

        /* Powered by (bottom-center) */
        .powered-by{
            position:absolute;bottom:0.5rem;left:50%;transform:translateX(-50%);z-index:1100;
            pointer-events:auto;
            font-size:0.6875rem;color:rgba(148,163,184,0.7);
            text-decoration:none;font-weight:500;
            transition:color 0.2s;
        }
        .powered-by:hover{color:#f1f5f9}

        .leaflet-control-attribution{display:none!important}

        @media(max-width:640px){
            .top-bar{padding:0.75rem 1rem}
            .brand{font-size:1.125rem;padding:0.4rem 1rem 0.4rem 0.5rem}
            .center-stack{top:4rem}
            .title-pill{font-size:1rem;padding:0.5rem 1.5rem}
            .view-badge{font-size:0.8125rem}
            .legend{display:none}
            .sponsored-badge{bottom:3rem;right:0.75rem;padding:0.4rem 0.625rem;border-radius:10px}
            .sponsored-logo{height:18px}
            .sponsored-label{font-size:0.5625rem}
            .sponsored-name{font-size:0.6875rem}
        }
    </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div><div class="loading-text">Loading migration data...</div></div>
<div id="map"></div>

<!-- Top bar: brand left, settings right -->
<div class="overlay top-bar">
    <a href="/app.html" class="brand">
        <img src="/img/logo-68.png" alt="Mygration" width="30" height="30">
        Mygration
    </a>
    <a href="/app.html" class="settings-btn">Settings</a>
</div>

<!-- Centered: species title + view badge -->
<div class="overlay center-stack">
    <div class="title-pill" id="viewTitle">Bird Migration</div>
    <div class="view-badge" id="viewBadge">North America</div>
</div>

<!-- Big sighting counter -->
<div class="overlay sighting-counter" id="sightingCounter">
    <div class="counter-num" id="counterNum">0</div>
    <div class="counter-label">Last 30 Days</div>
</div>

<!-- Legend -->
<div class="overlay legend" id="legend">
    <h4 id="legendGroupName">Species</h4>
    <div class="legend-period">Last 30 days</div>
    <div id="legendItems"></div>
</div>

<!-- Attribution with eBird + data timestamp -->
<div class="overlay attribution">
    <span>Data: <a href="https://ebird.org" target="_blank" rel="noopener">eBird.org</a> / Cornell Lab of Ornithology</span>
    <span class="data-time" id="dataTime"></span>
    <span>Mygration</span>
</div>

<!-- Sponsored by WBU -->
<a href="https://www.wildbirdscolorado.com" target="_blank" rel="noopener" class="sponsored-badge">
    <img src="https://www.wbu.com/wp-content/uploads/2016/04/logo.png" alt="Wild Birds Unlimited" class="sponsored-logo">
    <div class="sponsored-text">
        <span class="sponsored-label">Sponsored by</span>
        <span class="sponsored-name">Wild Birds Unlimited</span>
    </div>
</a>

<!-- Powered by Axis Digital -->
<a href="https://axisdigital.ai" target="_blank" rel="noopener" class="powered-by">Powered by axisdigital.ai</a>

<!-- Nav arrows -->
<div class="nav-arrows nav-left overlay"><button class="nav-arrow" onclick="navPrev()" title="Previous view">&#9664;</button></div>
<div class="nav-arrows nav-right overlay"><button class="nav-arrow" onclick="navNext()" title="Next view">&#9654;</button></div>

<!-- View dots -->
<div class="view-dots overlay" id="viewDots"></div>

<div class="overlay progress-bar" id="progressBar" style="width:0;"></div>
<!-- Rare sighting info card (bottom bar, like signage) -->
<div class="rare-card" id="rareCard">
    <img class="rare-card-img" id="rareCardImg" src="" alt="" style="display:none">
    <div class="rare-card-noimg" id="rareCardNoImg">&#x1F426;</div>
    <div class="rare-card-info">
        <div class="rare-card-badge">Rare Sighting</div>
        <div class="rare-card-name" id="rareCardName"></div>
        <div class="rare-card-sci" id="rareCardSci"></div>
        <div class="rare-card-loc"><span class="pin">&#x1F4CD;</span> <span id="rareCardLoc"></span></div>
        <div class="rare-card-meta">
            <span id="rareCardDate"></span>
            <span id="rareCardCount"></span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/viewer.js?v=4"></script>
</body>
</html>
