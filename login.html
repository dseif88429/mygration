<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Mygration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --accent: #3b82f6; --accent-hover: #2563eb; --text: #f1f5f9; --text-dim: #cbd5e1; --text-muted: #94a3b8; --danger: #ef4444; --glass-border: rgba(255,255,255,0.1); }
        html, body { min-height: 100vh; font-family: 'Inter', -apple-system, sans-serif; background: #0b1120; color: var(--text); }
        a { color: var(--accent); text-decoration: none; }
        .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .brand { display: flex; align-items: center; gap: 0.625rem; font-size: 1.375rem; font-weight: 800; color: var(--text); margin-bottom: 2.5rem; text-decoration: none; }
        .brand svg { width: 34px; height: 34px; }
        .card { background: rgba(15,23,42,0.8); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
        .card h2 { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem; }
        .card .sub { font-size: 1rem; color: var(--text-dim); text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.375rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--glass-border); border-radius: 12px; font-size: 1rem; outline: none; font-family: inherit; transition: border 0.2s; }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-error { font-size: 0.875rem; color: var(--danger); margin-bottom: 0.75rem; }
        .btn { width: 100%; padding: 1rem; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 1.0625rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer-text { font-size: 0.9375rem; color: var(--text-muted); text-align: center; margin-top: 1.25rem; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="page">
    <a href="/" class="brand">
        <svg viewBox="0 0 34 34" fill="none">
            <circle cx="17" cy="17" r="15" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.5"/>
            <path d="M7 20c3-5 7-9 14-11" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
            <path d="M9 25c3-3 8-7 16-8" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
            <circle cx="21" cy="11" r="2.5" fill="#10b981" opacity="0.9"/>
            <circle cx="14" cy="16" r="2" fill="#ec4899" opacity="0.8"/>
            <circle cx="25" cy="17" r="2" fill="#f59e0b" opacity="0.8"/>
        </svg>
        Mygration
    </a>
    <div class="card">
        <h2>Welcome back</h2>
        <p class="sub">Log in to your Mygration account</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">Email</label>
                <input class="form-input" type="email" id="username" required autocomplete="email" autofocus placeholder="jane@example.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" required autocomplete="current-password" placeholder="Your password">
            </div>
            <div id="loginError" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn" id="loginBtn">Log In</button>
            <p class="footer-text">Don't have an account? <a href="/#signup">Sign up free</a></p>
        </form>
    </div>
</div>
<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn'), errEl = document.getElementById('loginError');
    errEl.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Logging in...';
    try {
        const res = await fetch('/api/mygration/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('username').value.trim(), password: document.getElementById('password').value }), credentials: 'same-origin' });
        const result = await res.json();
        if (result.success) window.location.href = result.redirect || '/app.html';
        else { errEl.textContent = result.error || 'Invalid email or password'; errEl.style.display = 'block'; }
    } catch (err) { errEl.textContent = 'Network error.'; errEl.style.display = 'block'; }
    finally { btn.disabled = false; btn.innerHTML = 'Log In'; }
}
</script>
</body>
</html>
