<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Mygration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="navbar-inner">
        <a href="/" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="14" stroke="#3b82f6" stroke-width="2" fill="none"/>
                <path d="M8 18c2-4 6-8 12-10M10 22c3-3 7-6 14-7" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
                <circle cx="20" cy="10" r="2" fill="#10b981"/><circle cx="24" cy="15" r="1.5" fill="#f59e0b"/><circle cx="14" cy="14" r="1.5" fill="#ec4899"/>
            </svg>
            Mygration
        </a>
    </div>
</nav>
<div class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to your Mygration account</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group"><label class="form-label" for="username">Email</label><input class="form-input" type="email" id="username" name="username" required autocomplete="email" autofocus></div>
            <div class="form-group"><label class="form-label" for="password">Password</label><input class="form-input" type="password" id="password" name="password" required autocomplete="current-password"></div>
            <div id="loginError" class="form-error mb-2" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Log In</button>
            <p class="text-center text-sm mt-2">Don't have an account? <a href="/#signup">Sign up free</a></p>
        </form>
    </div>
</div>
<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn'), errEl = document.getElementById('loginError');
    errEl.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Logging in...';
    try {
        const res = await fetch('/api/mygration/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('username').value.trim(), password: document.getElementById('password').value }), credentials: 'same-origin' });
        const result = await res.json();
        if (result.success) { window.location.href = result.redirect || '/app.html'; }
        else { errEl.textContent = result.error || 'Invalid username or password'; errEl.style.display = 'block'; }
    } catch (err) { errEl.textContent = 'Network error.'; errEl.style.display = 'block'; }
    finally { btn.disabled = false; btn.innerHTML = 'Log In'; }
}
</script>
</body>
</html>
