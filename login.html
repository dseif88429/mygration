<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Mygration</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png?v=3">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --accent: #3b82f6; --accent-hover: #2563eb; --text: #f1f5f9; --text-dim: #cbd5e1; --text-muted: #94a3b8; --danger: #ef4444; --glass-border: rgba(255,255,255,0.1); }
        html, body { min-height: 100vh; font-family: 'Inter', -apple-system, sans-serif; background: #0b1120; color: var(--text); }
        a { color: var(--accent); text-decoration: none; }
        .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
        .brand { display: flex; align-items: center; gap: 0.625rem; font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: 2.5rem; text-decoration: none; }
        .brand svg { width: 36px; height: 36px; }
        .card { background: rgba(15,23,42,0.8); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 460px; }
        .card h2 { font-size: 1.75rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem; }
        .card .sub { font-size: 1.0625rem; color: var(--text-dim); text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.9375rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.375rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--glass-border); border-radius: 12px; font-size: 1.0625rem; outline: none; font-family: inherit; transition: border 0.2s; }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-error { font-size: 0.9375rem; color: var(--danger); margin-bottom: 0.75rem; }
        .btn { width: 100%; padding: 1rem; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 1.125rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .divider { text-align: center; color: var(--text-muted); font-size: 0.9375rem; margin: 1.5rem 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--glass-border); }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .footer-text { font-size: 1rem; color: var(--text-muted); text-align: center; margin-top: 1.25rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .toggle-link { color: var(--accent); cursor: pointer; font-weight: 600; }
        .toggle-link:hover { text-decoration: underline; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="page">
    <a href="/" class="brand">
        <img src="/img/logo-68.png" alt="Mygration" width="36" height="36" style="border-radius:50%;">
        Mygration
    </a>

    <!-- Login form -->
    <div class="card" id="loginCard">
        <h2>Welcome back</h2>
        <p class="sub">Log in to your account</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="loginEmail" required autocomplete="email" autofocus placeholder="jane@example.com"></div>
            <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="loginPassword" required autocomplete="current-password" placeholder="Your password"></div>
            <div id="loginError" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn" id="loginBtn">Log In</button>
            <p class="footer-text">Don't have an account? <span class="toggle-link" onclick="showPanel('signup')">Sign up free</span></p>
        </form>
    </div>

    <!-- Signup form -->
    <div class="card hidden" id="signupCard">
        <h2>Create your account</h2>
        <p class="sub">Free forever. Takes 30 seconds.</p>
        <form id="signupForm" onsubmit="return handleSignup(event)">
            <div class="form-row">
                <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" type="text" id="signupName" placeholder="Jane Smith" required autocomplete="name"></div>
                <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="signupEmail" placeholder="jane@example.com" required autocomplete="email"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="signupPassword" placeholder="8+ characters" required minlength="8" autocomplete="new-password"></div>
                <div class="form-group"><label class="form-label">Zip Code</label><input class="form-input" type="text" id="signupZip" placeholder="80202" required pattern="[0-9]{5}" autocomplete="postal-code"></div>
            </div>
            <div id="signupError" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn" id="signupBtn">Create Free Account</button>
            <p class="footer-text">Already have an account? <span class="toggle-link" onclick="showPanel('login')">Log in</span></p>
        </form>
    </div>
</div>
<script>
function showPanel(which) {
    document.getElementById('loginCard').classList.toggle('hidden', which !== 'login');
    document.getElementById('signupCard').classList.toggle('hidden', which !== 'signup');
}
// Check URL hash
if (window.location.hash === '#signup') showPanel('signup');

async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn'), errEl = document.getElementById('loginError');
    errEl.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Logging in...';
    try {
        const res = await fetch('/api/mygration/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: document.getElementById('loginEmail').value.trim(), password: document.getElementById('loginPassword').value }), credentials: 'same-origin' });
        const result = await res.json();
        if (result.success) window.location.href = result.redirect || '/app.html';
        else { errEl.textContent = result.error || 'Invalid email or password'; errEl.style.display = 'block'; }
    } catch (err) { errEl.textContent = 'Network error.'; errEl.style.display = 'block'; }
    finally { btn.disabled = false; btn.innerHTML = 'Log In'; }
}

async function handleSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('signupBtn'), errEl = document.getElementById('signupError');
    errEl.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating...';
    const body = { full_name: document.getElementById('signupName').value.trim(), email: document.getElementById('signupEmail').value.trim().toLowerCase(), password: document.getElementById('signupPassword').value, zip_code: document.getElementById('signupZip').value.trim() };
    try {
        const res = await fetch('/api/mygration/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body), credentials: 'same-origin' });
        const result = await res.json();
        if (result.success) window.location.href = result.redirect || '/app.html';
        else { errEl.textContent = Object.values(result.errors || {}).join('. ') || result.error || 'Signup failed.'; errEl.style.display = 'block'; }
    } catch (err) { errEl.textContent = 'Network error.'; errEl.style.display = 'block'; }
    finally { btn.disabled = false; btn.innerHTML = 'Create Free Account'; }
}
</script>
</body>
</html>
