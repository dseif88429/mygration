<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mygration</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --glass:rgba(15,23,42,0.88);--glass-light:rgba(15,23,42,0.75);
            --border:rgba(255,255,255,0.1);--border-active:#3b82f6;
            --accent:#3b82f6;--accent-hover:#2563eb;--success:#10b981;--danger:#ef4444;
            --text:#f1f5f9;--text-dim:#cbd5e1;--text-muted:#94a3b8;
            --radius:16px;--radius-sm:10px;
        }
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif;background:#0b1120;color:var(--text)}
        a{color:var(--accent);text-decoration:none}

        /* Map */
        #map{position:fixed;inset:0;z-index:0}
        .leaflet-control-attribution,.leaflet-control-zoom{display:none!important}

        /* UI layer */
        .ui{position:fixed;inset:0;z-index:1000;pointer-events:none}
        .ui>*{pointer-events:auto}

        /* Top bar */
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:0.875rem 1.25rem}
        .brand{display:flex;align-items:center;gap:0.625rem;font-size:1.5rem;font-weight:800;color:var(--text);text-decoration:none;background:rgba(15,23,42,0.92);backdrop-filter:blur(12px);border-radius:999px;padding:0.5rem 1.25rem 0.5rem 0.625rem;border:1px solid rgba(255,255,255,0.1);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
        .brand svg{width:34px;height:34px}
        .top-center{display:flex;gap:0.5rem;align-items:center;position:absolute;left:50%;transform:translateX(-50%)}
        .top-right{display:flex;gap:0.5rem;align-items:center}
        .pill{background:rgba(15,23,42,0.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);border-radius:999px;padding:0.5rem 1rem;font-size:0.8125rem;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.2s;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
        .pill:hover{background:rgba(15,23,42,0.95)}
        .pill.active{border-color:var(--accent);color:#fff;background:var(--accent)}
        .pill-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
        .pill-accent:hover{background:var(--accent-hover)}

        /* Drawer panels */
        .drawer{
            position:absolute;top:4.5rem;width:380px;max-width:calc(100vw - 1rem);
            max-height:calc(100vh - 5.5rem);overflow-y:auto;
            background:var(--glass);backdrop-filter:blur(20px);
            border:1px solid var(--border);border-radius:var(--radius);
            padding:1.5rem;transition:transform 0.3s ease,opacity 0.3s ease;
            opacity:0;pointer-events:none;z-index:1100;
        }
        .drawer.open{opacity:1;pointer-events:auto}
        .drawer-left{left:1rem;transform:translateX(-20px)}
        .drawer-left.open{transform:translateX(0)}
        .drawer-right{right:1rem;transform:translateX(20px)}
        .drawer-right.open{transform:translateX(0)}
        .drawer-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
        .drawer-close{background:none;border:none;color:var(--text-muted);font-size:1.25rem;cursor:pointer;padding:0.25rem;border-radius:6px;line-height:1}
        .drawer-close:hover{color:var(--text);background:rgba(255,255,255,0.06)}
        .drawer-section{margin-bottom:1.25rem}
        .drawer-label{font-size:0.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.5rem}

        /* Species cards in drawer */
        .sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
        .sp-card{
            border:2px solid var(--border);border-radius:var(--radius-sm);
            overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative;background:rgba(0,0,0,0.3)
        }
        .sp-card:hover{border-color:var(--text-muted)}
        .sp-card.selected{border-color:var(--accent);box-shadow:0 0 16px rgba(59,130,246,0.15)}
        .sp-card-img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;opacity:0.8}
        .sp-card:hover .sp-card-img,.sp-card.selected .sp-card-img{opacity:1}
        .sp-card-info{padding:0.5rem 0.625rem}
        .sp-card-name{font-size:0.75rem;font-weight:700}
        .sp-card-count{font-size:0.625rem;color:var(--text-muted)}
        .sp-card-dot{position:absolute;top:0.375rem;right:0.375rem;width:8px;height:8px;border-radius:50%;border:2px solid rgba(0,0,0,0.4)}

        /* Sub-species */
        .sub-grid{display:grid;grid-template-columns:1fr;gap:0.25rem;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)}
        .sub-item{display:flex;align-items:center;gap:0.5rem;padding:0.375rem 0.5rem;border-radius:6px;cursor:pointer;font-size:0.8125rem}
        .sub-item:hover{background:rgba(255,255,255,0.04)}
        .sub-item input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
        .sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
        .sub-all{font-size:0.8125rem;font-weight:600;color:var(--text-dim);display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem}
        .sub-all input{accent-color:var(--accent);width:16px;height:16px}

        /* Map style */
        .style-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
        .style-card{border:2px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:all 0.2s}
        .style-card:hover{border-color:var(--text-muted)}
        .style-card.selected{border-color:var(--accent)}
        .style-preview{width:100%;aspect-ratio:16/9;pointer-events:none}
        .style-name{padding:0.375rem;text-align:center;font-size:0.75rem;font-weight:600}

        /* Radius buttons */
        .radius-row{display:flex;gap:0.375rem;flex-wrap:wrap}
        .radius-btn{padding:0.4rem 0.75rem;border-radius:6px;font-size:0.8125rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text-dim);transition:all 0.15s;font-family:inherit}
        .radius-btn:hover{border-color:var(--text-muted)}
        .radius-btn.selected{border-color:var(--accent);background:rgba(59,130,246,0.1);color:var(--text)}

        /* Form elements */
        .input{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.75rem;font-size:0.9375rem;font-family:inherit;outline:none;width:100%}
        .input:focus{border-color:var(--accent)}
        .opt-select{background:#1e293b;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.75rem;font-size:0.875rem;font-family:inherit;cursor:pointer}
        .opt-select option{background:#1e293b;color:var(--text)}
        .rare-toggle{display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;font-weight:600;cursor:pointer}
        .rare-toggle input{accent-color:var(--accent);width:18px;height:18px}

        /* Viewer link (bottom center) */
        .viewer-bar{
            position:absolute;bottom:1.25rem;left:50%;transform:translateX(-50%);
            background:var(--glass);backdrop-filter:blur(16px);
            border:1px solid var(--border);border-radius:999px;
            padding:0.5rem 0.625rem 0.5rem 1.25rem;
            display:flex;align-items:center;gap:0.75rem;
            font-size:0.8125rem;color:var(--text-dim);white-space:nowrap;
        }
        .viewer-bar .vb-url{max-width:280px;overflow:hidden;text-overflow:ellipsis;font-family:monospace;font-size:0.75rem;color:var(--accent)}
        .vb-btn{padding:0.5rem 1rem;border-radius:999px;font-size:0.8125rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
        .vb-copy{background:rgba(255,255,255,0.06);color:var(--text)}
        .vb-copy:hover{background:rgba(255,255,255,0.12)}
        .vb-full{background:var(--accent);color:#fff}
        .vb-full:hover{background:var(--accent-hover)}

        /* Data notice */
        .data-notice{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:0.625rem 0.75rem;font-size:0.8125rem;color:#fbbf24;margin-top:0.75rem;margin-bottom:1rem;display:none}
        .data-notice.show{display:block}

        /* Saved flash */
        .saved{font-size:0.6875rem;color:var(--success);opacity:0;transition:opacity 0.3s;margin-left:0.5rem}
        .saved.show{opacity:1}

        /* Legend (bottom-left) */
        .legend{
            position:absolute;bottom:4.5rem;left:1.25rem;
            background:var(--glass);backdrop-filter:blur(16px);
            border:1px solid var(--border);border-radius:var(--radius);
            padding:1rem 1.25rem;min-width:220px;
        }
        .legend-title{font-size:0.9375rem;font-weight:700;margin-bottom:0.5rem}
        .legend-item{display:flex;align-items:center;gap:0.5rem;font-size:0.8125rem;color:var(--text-dim);padding:0.3rem 0.35rem;cursor:pointer;border-radius:6px;user-select:none}
        .legend-item:hover{background:rgba(255,255,255,0.05)}
        .legend-item.off{opacity:0.3}
        .legend-check{width:16px;height:16px;border-radius:3px;border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .legend-item:not(.off) .legend-check{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25)}
        .legend-item:not(.off) .legend-check::after{content:'\2713';color:var(--text);font-size:0.6rem;font-weight:700}
        .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .legend-name{flex:1}
        .legend-count{font-size:0.75rem;color:var(--text-muted);font-variant-numeric:tabular-nums}

        /* Legend/viewer hide state (toggled by JS) */
        .legend.hidden-by-drawer, .viewer-bar.hidden-by-drawer { opacity:0;pointer-events:none;transition:opacity 0.2s }
        .legend, .viewer-bar { transition:opacity 0.2s }

        /* Mobile */
        @media(max-width:700px){
            .drawer{width:calc(100vw - 1rem);top:auto;bottom:0;max-height:70vh;border-radius:var(--radius) var(--radius) 0 0}
            .drawer-left{left:0.5rem;transform:translateY(20px)}
            .drawer-left.open{transform:translateY(0)}
            .drawer-right{right:0.5rem;transform:translateY(20px)}
            .drawer-right.open{transform:translateY(0)}
            .top-center{display:none}
            .legend{bottom:4.5rem;left:0.75rem;min-width:180px;padding:0.75rem}
            .viewer-bar{left:0.75rem;right:0.75rem;transform:none}
            .viewer-bar .vb-url{display:none}
        }

        /* Spinner */
        .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div id="map"></div>
<div class="ui">
    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="brand">
            <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.5"/><path d="M6 16c2-3.5 5.5-7 11-9" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/><circle cx="17" cy="9" r="2" fill="#10b981" opacity="0.9"/><circle cx="12" cy="13" r="1.5" fill="#ec4899" opacity="0.8"/><circle cx="20" cy="14" r="1.5" fill="#f59e0b" opacity="0.8"/></svg>
            Mygration
        </a>
        <div class="top-center">
            <button class="pill" id="btnSpecies" onclick="toggleDrawer('left')">Species</button>
            <button class="pill" id="btnSettings" onclick="toggleDrawer('right')">Settings</button>
        </div>
        <div class="top-right">
            <span class="pill" id="userLabel" style="cursor:default"></span>
            <button class="pill" onclick="handleLogout()">Log out</button>
        </div>
    </div>

    <!-- LEFT DRAWER: Species -->
    <div class="drawer drawer-left" id="drawerLeft">
        <div class="drawer-title">Species Group <button class="drawer-close" onclick="toggleDrawer('left')">&times;</button></div>
        <div class="sp-grid" id="speciesGrid"></div>
        <div class="data-notice" id="dataNotice">Migration data for this group will be available soon. Hummingbird data is live now.</div>
        <div id="subSection" style="display:none">
            <div class="sub-all"><input type="checkbox" id="selAll" onchange="toggleAll(this.checked)" checked> Select All</div>
            <div class="sub-grid" id="subGrid"></div>
        </div>
    </div>

    <!-- RIGHT DRAWER: Settings -->
    <div class="drawer drawer-right" id="drawerRight">
        <div class="drawer-title">Settings <button class="drawer-close" onclick="toggleDrawer('right')">&times;</button></div>

        <div class="drawer-section">
            <div class="drawer-label">Location <span class="saved" id="locSaved">Saved</span></div>
            <div style="display:flex;gap:0.5rem">
                <input class="input" type="text" id="zipInput" placeholder="Zip code" maxlength="5" style="width:110px">
                <button class="pill" onclick="updateLoc()">Update</button>
            </div>
            <div style="font-size:0.8125rem;color:var(--text-muted);margin-top:0.35rem" id="locLabel"></div>
        </div>

        <div class="drawer-section">
            <div class="drawer-label">Map Style <span class="saved" id="fmtSaved">Saved</span></div>
            <div class="style-grid" id="styleGrid"></div>
        </div>

        <div class="drawer-section">
            <div class="drawer-label">Rare Bird Alerts</div>
            <label class="rare-toggle"><input type="checkbox" id="rareToggle" onchange="save()" checked> Show rare birds</label>
            <div class="radius-row" style="margin-top:0.625rem">
                <button class="radius-btn" data-mi="5" onclick="pickRadius(8)">5 mi</button>
                <button class="radius-btn" data-mi="25" onclick="pickRadius(40)">25 mi</button>
                <button class="radius-btn selected" data-mi="50" onclick="pickRadius(80)">50 mi</button>
                <button class="radius-btn" data-mi="100" onclick="pickRadius(161)">100 mi</button>
            </div>
        </div>

        <div class="drawer-section">
            <div class="drawer-label">Display</div>
            <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
                <div>
                    <span style="font-size:0.8125rem;color:var(--text-dim)">Rotation</span>
                    <select class="opt-select" id="rotSpeed" onchange="save()" style="margin-left:0.375rem">
                        <option value="10">10 sec</option><option value="15" selected>15 sec</option>
                        <option value="20">20 sec</option><option value="30">30 sec</option><option value="60">60 sec</option>
                    </select>
                </div>
                <div>
                    <span style="font-size:0.8125rem;color:var(--text-dim)">Dot Size</span>
                    <select class="opt-select" id="dotSize" onchange="changeDotSize()" style="margin-left:0.375rem">
                        <option value="2">Small</option><option value="4" selected>Medium</option>
                        <option value="6">Large</option><option value="9">X-Large</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Legend (bottom-left) -->
    <div class="legend" id="legend">
        <div class="legend-title" id="legendTitle"></div>
        <div id="legendItems"></div>
    </div>

    <!-- Viewer bar (bottom-center) -->
    <div class="viewer-bar" id="viewerBar">
        <span class="vb-url" id="viewerUrl"></span>
        <button class="vb-btn vb-copy" onclick="copyLink()">Copy Link</button>
        <a class="vb-btn vb-full" id="viewerFullBtn" href="#" target="_blank">Live View</a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/api.js?v=2"></script>
<script>
const TILES = {
    street: { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', label: 'Street' },
    dark: { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', label: 'Dark' },
    satellite: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', label: 'Satellite' },
    positron: { url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', label: 'Light' }
};

let S = { prefs: null, groups: [], token: null, birdImages: {}, saveTimer: null, tileLayer: null };

// Map
const map = L.map('map', { center: [39, -98], zoom: 5, zoomControl: false, attributionControl: false });
const markerLayer = L.layerGroup().addTo(map);
const speciesLayers = {};
const speciesVisible = {};
let sightingCounts = {};

// ---- Boot ----
async function boot() {
    const [me, gr, imgs] = await Promise.all([API.getMe(), API.getSpeciesGroups(), API.get('/bird-images')]);
    if (!me || !me.success) { window.location.href = '/login.html'; return; }
    S.prefs = me.preferences; S.groups = gr?.groups || []; S.token = me.display_token;
    S.birdImages = imgs?.images || {};
    document.getElementById('userLabel').textContent = me.user.full_name || '';

    // Set map
    const fmt = S.prefs.map_format || 'street';
    S.tileLayer = L.tileLayer((TILES[fmt] || TILES.street).url, { maxZoom: 18, subdomains: 'abcd', errorTileUrl: '' }).addTo(map);
    // Tile layer is cached by Service Worker -- no manual refresh needed
    if (S.prefs.location_lat) map.setView([S.prefs.location_lat, S.prefs.location_lng], 6);

    // Set legend title from saved preference immediately
    const currentGroup = S.groups.find(x => x.group_key === S.prefs.primary_group_key);
    if (currentGroup) document.getElementById('legendTitle').textContent = currentGroup.group_name;

    renderSpecies(); renderSubs(); renderLoc(); renderStyles(); renderOpts(); renderLink();
    loadSightings();
}

// ---- Load sightings onto map ----
async function loadSightings() {
    if (!S.token) return;
    try {
        const res = await fetch('/api/mygration/viewer/' + S.token.token + '/content?_=' + Date.now());
        const data = await res.json();
        if (!data.success || !data.sightings?.length) return;

        // Clear existing
        Object.values(speciesLayers).forEach(l => map.removeLayer(l));

        const species = data.species_info?.species || [];
        sightingCounts = {};
        data.sightings.forEach(s => { sightingCounts[s.sc] = (sightingCounts[s.sc] || 0) + 1; });

        species.forEach(sp => {
            const layer = L.layerGroup();
            data.sightings.filter(s => s.sc === sp.code).forEach(s => {
                L.circleMarker([s.la, s.ln], { radius: getDotSize(), fillColor: sp.color, fillOpacity: 0.8, color: sp.color, weight: 0, interactive: false }).addTo(layer);
            });
            speciesLayers[sp.code] = layer;
            speciesVisible[sp.code] = true;
            layer.addTo(map);
        });

        // Legend
        document.getElementById('legendTitle').textContent = data.species_info?.group_name || 'Species';
        document.getElementById('legendItems').innerHTML = species
            .filter(sp => sightingCounts[sp.code] > 0)
            .sort((a, b) => (sightingCounts[b.code] || 0) - (sightingCounts[a.code] || 0))
            .map(sp =>
                '<div class="legend-item" data-species="' + sp.code + '" onclick="toggleSpecies(\'' + sp.code + '\')">' +
                '<span class="legend-check"></span>' +
                '<span class="legend-dot" style="background:' + sp.color + ';box-shadow:0 0 6px ' + sp.color + '"></span>' +
                '<span class="legend-name">' + sp.name + '</span>' +
                '<span class="legend-count">' + (sightingCounts[sp.code] || 0).toLocaleString() + '</span></div>'
            ).join('');
    } catch (e) { console.error('Load sightings:', e); }
}

function toggleSpecies(code) {
    if (speciesVisible[code]) { map.removeLayer(speciesLayers[code]); speciesVisible[code] = false; }
    else { map.addLayer(speciesLayers[code]); speciesVisible[code] = true; }
    document.querySelector('[data-species="' + code + '"]')?.classList.toggle('off', !speciesVisible[code]);
}

// ---- Drawers ----
function toggleDrawer(side) {
    const drawer = document.getElementById(side === 'left' ? 'drawerLeft' : 'drawerRight');
    const other = document.getElementById(side === 'left' ? 'drawerRight' : 'drawerLeft');
    const isOpen = drawer.classList.contains('open');
    other.classList.remove('open');
    drawer.classList.toggle('open', !isOpen);
    document.getElementById('btnSpecies').classList.toggle('active', side === 'left' && !isOpen);
    document.getElementById('btnSettings').classList.toggle('active', side === 'right' && !isOpen);
    updateOverlayVisibility();
}

function updateOverlayVisibility() {
    const anyOpen = document.querySelector('.drawer.open');
    document.getElementById('legend').classList.toggle('hidden-by-drawer', !!anyOpen);
    document.getElementById('viewerBar').classList.toggle('hidden-by-drawer', !!anyOpen);
}

// ---- Species ----
function findImg(groupName, species) {
    const imgs = S.birdImages; if (!imgs || !Object.keys(imgs).length) return '';
    const words = groupName.toLowerCase().split(/[\s&,]+/).filter(w => w.length > 2);
    const stems = []; words.forEach(w => { stems.push(w); stems.push(w.replace(/s$/, '')); });
    const keys = Object.keys(imgs);
    for (const stem of stems) { if (stem.length < 3) continue; for (const k of keys) { if (k.toLowerCase().includes(stem)) return imgs[k]; } }
    if (species?.length) { for (const sp of species) { if (imgs[sp.name]) return imgs[sp.name]; for (const k of keys) { if (k.toLowerCase().includes(sp.name.toLowerCase().split(/\s+/)[0])) return imgs[k]; } } }
    return '';
}

function renderSpecies() {
    document.getElementById('speciesGrid').innerHTML = S.groups.map(g => {
        const img = findImg(g.group_name, g.species);
        const sel = g.group_key === S.prefs.primary_group_key;
        return '<div class="sp-card ' + (sel ? 'selected' : '') + '" onclick="pickGroup(\'' + g.group_key + '\')">' +
            '<div class="sp-card-dot" style="background:' + g.dot_color + '"></div>' +
            (img ? '<img class="sp-card-img" src="' + img + '" alt="' + g.group_name + '" loading="lazy">' :
                   '<div class="sp-card-img" style="background:linear-gradient(135deg,' + g.dot_color + '22,' + g.dot_color + '08);display:flex;align-items:center;justify-content:center;opacity:0.5;font-size:1.5rem">&#x1F426;</div>') +
            '<div class="sp-card-info"><div class="sp-card-name">' + g.group_name + '</div><div class="sp-card-count">' + g.species_count + ' species</div></div></div>';
    }).join('');
    document.getElementById('dataNotice').classList.toggle('show', S.prefs.primary_group_key !== 'hummingbirds');
}

async function pickGroup(k) {
    S.prefs.primary_group_key = k; S.prefs.selected_species = null;
    const g = S.groups.find(x => x.group_key === k);

    // Update legend immediately from group species (no waiting for API)
    if (g) {
        document.getElementById('legendTitle').textContent = g.group_name;
        document.getElementById('legendItems').innerHTML = g.species.map(sp =>
            '<div class="legend-item" data-species="' + sp.code + '" onclick="toggleSpecies(\'' + sp.code + '\')">' +
            '<span class="legend-check"></span>' +
            '<span class="legend-dot" style="background:' + sp.color + ';box-shadow:0 0 6px ' + sp.color + '"></span>' +
            '<span class="legend-name">' + sp.name + '</span>' +
            '<span class="legend-count">--</span></div>'
        ).join('');
    }

    // Clear old dots from map
    Object.values(speciesLayers).forEach(l => map.removeLayer(l));
    Object.keys(speciesLayers).forEach(k => delete speciesLayers[k]);
    Object.keys(speciesVisible).forEach(k => delete speciesVisible[k]);
    sightingCounts = {};

    renderSpecies(); renderSubs();
    await saveNow();
    loadSightings();
}

function renderSubs() {
    const g = S.groups.find(x => x.group_key === S.prefs.primary_group_key); if (!g) return;
    document.getElementById('subSection').style.display = '';
    const sel = S.prefs.selected_species;
    document.getElementById('subGrid').innerHTML = g.species.map(sp =>
        '<label class="sub-item"><input type="checkbox" value="' + sp.code + '" ' + (!sel || sel.includes(sp.code) ? 'checked' : '') + ' onchange="updateSubs()"><span class="sub-dot" style="background:' + sp.color + '"></span>' + sp.name + '</label>'
    ).join('');
    document.getElementById('selAll').checked = !sel;
}

function toggleAll(c) { document.querySelectorAll('#subGrid input').forEach(cb => cb.checked = c); updateSubs(); }
function updateSubs() {
    const g = S.groups.find(x => x.group_key === S.prefs.primary_group_key);
    const checked = Array.from(document.querySelectorAll('#subGrid input:checked')).map(cb => cb.value);
    S.prefs.selected_species = checked.length === g.species.length ? null : checked;
    document.getElementById('selAll').checked = !S.prefs.selected_species;
    save(); loadSightings();
}

// ---- Location ----
function renderLoc() { document.getElementById('zipInput').value = S.prefs.location_zip || ''; document.getElementById('locLabel').textContent = S.prefs.location_label || ''; }
async function updateLoc() {
    const zip = document.getElementById('zipInput').value.trim(); if (!/^\d{5}$/.test(zip)) return;
    const r = await API.geocode(zip);
    if (r?.success) {
        Object.assign(S.prefs, { location_zip: zip, location_lat: r.lat, location_lng: r.lng, location_label: r.label });
        document.getElementById('locLabel').textContent = r.label;
        map.setView([r.lat, r.lng], 7);
        flash('locSaved'); save();
    }
}

// ---- Map styles ----
function renderStyles() {
    document.getElementById('styleGrid').innerHTML = Object.entries(TILES).map(([k, t]) =>
        '<div class="style-card ' + (k === (S.prefs.map_format || 'street') ? 'selected' : '') + '" onclick="pickStyle(\'' + k + '\')">' +
        '<div class="style-preview" id="sp_' + k + '"></div>' +
        '<div class="style-name">' + t.label + '</div></div>'
    ).join('');
    setTimeout(() => {
        const lat = S.prefs.location_lat || 39.75, lng = S.prefs.location_lng || -105;
        Object.entries(TILES).forEach(([k, t]) => {
            const el = document.getElementById('sp_' + k); if (!el || el._lf) return;
            const m = L.map(el, { center: [lat, lng], zoom: 5, zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false, keyboard: false });
            L.tileLayer(t.url, { maxZoom: 18, subdomains: 'abcd' }).addTo(m);
            el._lf = m;
        });
    }, 200);
}

function pickStyle(k) {
    S.prefs.map_format = k;
    if (S.tileLayer) S.tileLayer.setUrl((TILES[k] || TILES.street).url);
    document.querySelectorAll('.style-card').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    flash('fmtSaved'); save();
}

// ---- Options ----
function renderOpts() {
    document.getElementById('rotSpeed').value = S.prefs.rotation_interval_sec || 15;
    document.getElementById('rareToggle').checked = S.prefs.rare_birds_enabled !== false;
    highlightRadius(S.prefs.rare_birds_radius_km || 80);
}
function pickRadius(km) { S.prefs.rare_birds_radius_km = km; highlightRadius(km); save(); }
function highlightRadius(km) {
    const m = {8:5, 40:25, 80:50, 161:100};
    const closest = Object.keys(m).reduce((a, b) => Math.abs(b - km) < Math.abs(a - km) ? b : a);
    document.querySelectorAll('.radius-btn').forEach(btn => btn.classList.toggle('selected', parseInt(btn.dataset.mi) === m[closest]));
}

// ---- Viewer link ----
function renderLink() {
    if (!S.token) return;
    const shortUrl = location.origin + '/v/' + (S.token.short_code || S.token.token);
    document.getElementById('viewerUrl').textContent = shortUrl;
    updateLiveViewLink();
}
function copyLink() {
    const shortUrl = location.origin + '/v/' + (S.token.short_code || S.token.token);
    navigator.clipboard.writeText(shortUrl).then(() => {
        const b = document.querySelector('[onclick="copyLink()"]'); b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy Link', 2000);
    });
}

// ---- Save ----
async function saveNow() {
    clearTimeout(S.saveTimer);
    await API.updatePreferences({
        primary_group_key: S.prefs.primary_group_key, selected_species: S.prefs.selected_species,
        location_zip: S.prefs.location_zip, location_lat: S.prefs.location_lat,
        location_lng: S.prefs.location_lng, location_label: S.prefs.location_label,
        map_format: S.prefs.map_format,
        rotation_interval_sec: parseInt(document.getElementById('rotSpeed').value),
        rare_birds_enabled: document.getElementById('rareToggle').checked,
        rare_birds_radius_km: S.prefs.rare_birds_radius_km || 80,
    });
    updateLiveViewLink();
}

function save() {
    clearTimeout(S.saveTimer);
    S.saveTimer = setTimeout(async () => {
        await API.updatePreferences({
            primary_group_key: S.prefs.primary_group_key, selected_species: S.prefs.selected_species,
            location_zip: S.prefs.location_zip, location_lat: S.prefs.location_lat,
            location_lng: S.prefs.location_lng, location_label: S.prefs.location_label,
            map_format: S.prefs.map_format,
            rotation_interval_sec: parseInt(document.getElementById('rotSpeed').value),
            rare_birds_enabled: document.getElementById('rareToggle').checked,
            rare_birds_radius_km: S.prefs.rare_birds_radius_km || 80,
        });
    }, 400);
}

function getDotSize() { return parseInt(document.getElementById('dotSize')?.value || 4); }
function changeDotSize() { loadSightings(); }
function updateLiveViewLink() {
    if (!S.token) return;
    document.getElementById('viewerFullBtn').href = location.origin + '/viewer.html?t=' + S.token.token + '&fresh=' + Date.now();
}
function flash(id) { const el = document.getElementById(id); el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500); }
async function handleLogout() { await API.logout(); window.location.href = '/'; }

// Close drawers on map click
map.on('click', () => {
    document.getElementById('drawerLeft').classList.remove('open');
    document.getElementById('drawerRight').classList.remove('open');
    document.getElementById('btnSpecies').classList.remove('active');
    document.getElementById('btnSettings').classList.remove('active');
    updateOverlayVisibility();
});

// Register tile-caching service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}

boot();
</script>
</body>
</html>
